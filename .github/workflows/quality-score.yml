name: Quality Score

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  quality-score:
    name: Generate Quality Score
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/common/*.sh

      - name: Generate quality score
        run: ./scripts/quality-score.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet docs/QUALITY_SCORE.md 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated quality score
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/QUALITY_SCORE.md
          git commit -m "docs: update quality score [skip ci]"
          git push
