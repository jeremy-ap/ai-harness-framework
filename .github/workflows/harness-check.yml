name: Harness Check

on:
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  harness-check:
    name: Run Harness Linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/common/*.sh

      - name: Run harness-doctor
        run: ./scripts/harness-doctor.sh --ci
